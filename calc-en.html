<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Security Quote Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&family=Abril+Fatface&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #06080c;
  --s0: #0b0f16;
  --s1: #0f141d;
  --s2: #141b26;
  --border: #1c2736;
  --bdr2: #243040;
  --gold: #c9993a;
  --goldbr: #e8b84b;
  --text: #b8cfdf;
  --muted: #486070;
  --dim: #253545;
  --green: #5bc98a;
  --red: #e05c5c;
  --mono: 'DM Mono', monospace;
  --head: 'Syne', sans-serif;
}
body { background:var(--bg); color:var(--text); font-family:var(--mono); min-height:100vh; padding:1.5rem 1rem; }
.shell { max-width:1280px; margin:0 auto; background:var(--s0); border:1px solid var(--border); border-radius:1.4rem; overflow:hidden; }
.hdr { background:var(--s1); padding:1.4rem 2rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:1rem; flex-wrap:nowrap; overflow:hidden; }
/* 核心修改部分 */
.hdr-title {
  font-family:var(--head);
  font-size:1.5rem;
  font-weight:800;
  color:#e8f2fc;
  white-space:nowrap;
  letter-spacing:-0.03em;
  transform:scaleX(0.92);
  transform-origin:left;
  flex-shrink: 0;
}
.tag { font-size:.65rem; padding:.18rem .7rem; border-radius:20px; background:#c9993a18; border:.5px solid #c9993a55; color:var(--goldbr); letter-spacing:.5px; white-space:nowrap; }
.cost-badge { display:none; font-size:.6rem; padding:.18rem .7rem; border-radius:20px; background:#5bc98a18; border:.5px solid #5bc98a55; color:var(--green); letter-spacing:.5px; white-space:nowrap; }
.cost-badge.show { display:inline; }
.main { display:grid; grid-template-columns:1fr 1fr; }
@media(max-width:700px){ .main { grid-template-columns:1fr; } }
.col-form { padding:1.8rem 1.6rem; border-right:1px solid var(--border); }
.col-quote { padding:1.8rem 1.6rem; background:var(--s1); display:flex; flex-direction:column; }
.slabel { font-family:var(--head); font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--gold); margin:1.6rem 0 .9rem; }
.slabel:first-child { margin-top:0; }
.field { margin-bottom:.9rem; }
.field > span { display:block; font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:.3rem; }
select, input[type=number], input[type=text] {
  width:100%; background:var(--bg); border:1px solid var(--bdr2); border-radius:.6rem;
  padding:.6rem .85rem; font-size:.83rem; font-family:var(--mono); color:var(--text);
  transition:border-color .15s;
}
select:focus, input[type=number]:focus, input[type=text]:focus { outline:none; border-color:var(--gold); }
select option { background:#0b0f16; }
.hint { font-size:.62rem; color:var(--muted); margin-top:.25rem; }
.checks { display:flex; flex-direction:column; gap:.5rem; }
.chk { display:flex; align-items:center; gap:.6rem; font-size:.78rem; color:var(--text); cursor:pointer; padding:.5rem .7rem; border-radius:.5rem; border:1px solid var(--border); transition:border-color .15s; }
.chk:hover { border-color:var(--bdr2); }
.chk input { accent-color:var(--goldbr); width:14px; height:14px; }
.chk-price { margin-left:auto; color:var(--gold); font-size:.72rem; }
.btn-reset { width:100%; margin-top:1.2rem; padding:.6rem; background:transparent; border:1px solid var(--bdr2); border-radius:2rem; color:var(--gold); font-family:var(--mono); font-size:.75rem; cursor:pointer; letter-spacing:.5px; transition:.15s; }
.btn-reset:hover { border-color:var(--goldbr); background:#c9993a0d; }
.wiring-tabs { display:flex; gap:.5rem; margin-bottom:.8rem; }
.wiring-tab { flex:1; padding:.45rem .5rem; text-align:center; font-size:.72rem; font-family:var(--mono); border:1px solid var(--bdr2); border-radius:.5rem; cursor:pointer; transition:.15s; color:var(--muted); background:transparent; }
.wiring-tab:hover { border-color:var(--gold); color:var(--text); }
.wiring-tab.active { border-color:var(--goldbr); color:var(--goldbr); background:#c9993a0e; }
.wiring-panel { display:none; }
.wiring-panel.visible { display:block; }
.total-block { text-align:center; padding:1.4rem 1rem 1.2rem; border-bottom:1px solid var(--border); margin-bottom:1rem; }
.total-lbl { font-size:.65rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:.3rem; }
.total-num { font-family:var(--head); font-size:3rem; font-weight:800; color:var(--goldbr); line-height:1; }
.breakdown { width:100%; border-collapse:collapse; }
.br-head td { font-family:var(--head); font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gold); padding:.9rem 0 .3rem; border-bottom:1px solid var(--bdr2); }
.br-row td { padding:.42rem 0; border-bottom:1px solid var(--border); font-size:.79rem; }
.br-row:last-child td { border-bottom:none; }
.br-label { color:var(--muted); }
.br-amt { text-align:right; font-weight:500; color:var(--text); }
.br-amt.zero { color:var(--dim); }
.br-amt.accent { color:var(--goldbr); }
.br-amt.saving { color:var(--green); }
.br-sub td { padding:.5rem 0; border-top:1px solid var(--bdr2); font-size:.8rem; font-weight:500; }
.br-sub .br-label { color:var(--text); }
.br-sub .br-amt { color:var(--goldbr); text-align:right; }
.est-box { background:var(--s2); border:1px solid var(--border); border-radius:.8rem; padding:.9rem 1rem; margin-top:1.2rem; display:grid; grid-template-columns:1fr 1fr; gap:.4rem .8rem; }
.est-box h4 { grid-column:1/-1; font-family:var(--head); font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gold); margin-bottom:.3rem; }
.est-item { display:flex; flex-direction:column; gap:.15rem; }
.est-lbl { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
.est-val { font-size:.9rem; color:var(--text); font-weight:500; }
.egg-box { margin-top:1.2rem; background:var(--s2); border:1px solid var(--border); border-radius:.8rem; padding:.85rem 1rem; }
.egg-lbl { font-size:.62rem; color:var(--muted); margin-bottom:.5rem; letter-spacing:.5px; }
.egg-lbl em { color:var(--gold); font-style:normal; }
.egg-input-row input { border-radius:.5rem; font-size:.8rem; }
.egg-status { font-size:.7rem; margin-top:.4rem; min-height:1rem; }
.egg-status.ok { color:var(--green); }
.egg-status.err { color:var(--red); }
.egg-status.blank { color:transparent; }
.logo-footer { border-top:1px solid var(--border); padding:1rem 2rem; background:var(--s1); display:flex; justify-content:center; align-items:center; gap:.9rem; }
.logo-by, .logo-provide { font-family:var(--mono); font-size:.72rem; color:var(--muted); letter-spacing:2px; white-space:nowrap; }
.sentryai-wordmark { display:inline-flex; align-items:flex-end; gap:0; position:relative; padding-bottom:3px; }
.sentryai-wordmark::before { content:'🛡'; font-size:1.1rem; margin-right:.3rem; margin-bottom:.22rem; filter:saturate(1.6) brightness(1.1); }
.s-sentry { font-family:'Abril Fatface', serif; font-size:1.7rem; letter-spacing:.03em; background:linear-gradient(130deg,#ffe47a 0%,#e8b84b 30%,#b8821a 60%,#f2cc60 85%,#ffe47a 100%); background-size:220% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:goldFlow 5s ease-in-out infinite alternate; line-height:1; }
.s-ai { font-family:var(--mono); font-size:.68rem; font-weight:500; letter-spacing:.18em; color:var(--goldbr); margin-left:.1rem; margin-bottom:.28rem; padding:.06rem .3rem; border:.5px solid #e8b84b66; border-radius:3px; background:#e8b84b0d; opacity:.9; }
.sentryai-wordmark::after { content:''; position:absolute; bottom:0; left:1.5rem; right:0; height:1.5px; background:linear-gradient(90deg,#e8b84b99,transparent); border-radius:2px; animation:lineBreath 3s ease-in-out infinite; }
@keyframes goldFlow { 0% { background-position:0% center; } 100% { background-position:220% center; } }
@keyframes lineBreath { 0%,100% { opacity:.3; transform:scaleX(.6); transform-origin:left; } 50% { opacity:1; transform:scaleX(1); transform-origin:left; } }
.footnote { background:var(--bg); border-top:1px solid var(--border); padding:.7rem 2rem; font-size:.63rem; color:var(--muted); text-align:center; line-height:1.8; }
/* 针对超窄屏幕的最后保险 */
@media(max-width:380px) {
  .hdr-title { font-size: 1.2rem; transform: scaleX(0.85); }
  .hdr { padding: 1rem 1.2rem; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <span class="hdr-title">🗽 NYC CCTV Quote</span>
    <span class="tag" id="tagDate">2026 Q2</span>
    <span class="cost-badge" id="costBadge">✦ Cost Mode</span>
  </header>
  <div class="main">
    <div class="col-form">
      <!-- ... 左侧表单保持不变 ... -->
    </div>
    <div class="col-quote">
      <!-- ... 报价部分保持不变 ... -->

      <div class="egg-box">
        <div class="egg-lbl">🏷 Coupon <em>— Next Drop Coming Soon</em></div>
        <div class="egg-input-row">
          <input type="text" id="eggInput" placeholder="Enter code..." autocomplete="off" spellcheck="false">
        </div>
        <div class="egg-status blank" id="eggStatus">　</div>
      </div>
    </div>
  </div>

  <div class="logo-footer">
    <span class="logo-by">By</span>
    <div class="sentryai-wordmark"><span class="s-sentry">SentryAI</span><span class="s-ai">NYC</span></div>
    <span class="logo-provide">Powered</span>
  </div>
  <div class="footnote">
    HDD capacity estimated based on channel count & resolution · Recorder model matched automatically · Final price subject to site survey · Taxes excluded
  </div>
</div>

<script>
// ==================== 原有代码保持不变 ====================
const PRICES = `...`;   // （你的价格数据保持不变）
const P = {}, PC = {};
// ...（中间所有原有代码不变）...

// ==================== 新增：Coupon 点击提示 ====================
const eggInput = document.getElementById('eggInput');

eggInput.addEventListener('focus', function() {
    this.placeholder = "This offer has expired 🔥 Next round has even better deals!";
});

eggInput.addEventListener('blur', function() {
    this.placeholder = "Enter code...";
});

// ==================== 原有 Coupon 验证逻辑（保持有效）================
$('eggInput').addEventListener('input', function() {
  const val = this.value.trim().toLowerCase();
  const status = $('eggStatus');
  const badge = $('costBadge');

  if (val === '') { 
    status.textContent = '　'; 
    status.className = 'egg-status blank'; 
    return; 
  }

  if (val === 'sentryai') {
    costMode = true; 
    compute(); 
    badge.classList.add('show');
    status.textContent = '✅ Cost pricing unlocked!'; 
    status.className = 'egg-status ok';
  } else {
    status.textContent = 'Invalid code'; 
    status.className = 'egg-status err';
    if (costMode) { 
      costMode = false; 
      badge.classList.remove('show'); 
      compute(); 
    }
  }
});

// 其余原有代码不变
function resetAll() { ... }
['camType','resolution','camCount','hdd','supplyMode','moulding','piping','borough'].forEach(id => {
  $(id).addEventListener('input', compute);
  $(id).addEventListener('change', compute);
});
['chkPoe','chkWarranty'].forEach(id => $(id).addEventListener('change', compute));
$('btnReset').addEventListener('click', resetAll);
compute();
</script>
</body>
</html>
